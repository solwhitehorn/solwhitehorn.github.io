<div class="posts">
  {% for post in site.categories.blog %}
    <article class="post">
      <h2><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      <img src="{{post.illustration}}" style="padding: 5px;zoom:12%;float:right;">
      </h2>
      	
      {{ post.subtitle }}<br>{{ post.date | date: "%-d %B %Y" }} - 
      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
